<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis pedidos | Productos Álvarez</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    :root{
      --site-primary:#2b9c9c;
      --site-primary-dark:#247f7f;
      --site-soft:#eef9f8;
      --site-soft-2:#f7fbfb;
      --site-border:#cfe7e5;
      --site-text:#2f3b3b;
      --site-muted:#6b7c7c;
      --site-white:#ffffff;
      --site-danger:#c23b22;
      --site-danger-bg:#fdecea;
      --site-warn:#a56a00;
      --site-warn-bg:#fff4db;
      --site-success:#1f7a4d;
      --site-success-bg:#e9f7ef;
    }

    body{
      background:#f5f5f5;
      color:var(--site-text);
    }

    .orders-wrap{
      max-width:1000px;
      margin:0 auto;
      padding:40px 20px 60px;
    }

    .orders-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:28px;
      padding:24px 28px;
      background:var(--site-white);
      border:1px solid #ececec;
      border-radius:18px;
      box-shadow:0 8px 24px rgba(0,0,0,.04);
    }

    .orders-header h1{
      margin:0 0 8px;
      font-size:2rem;
      line-height:1.1;
      color:#2f3b3b;
    }

    .orders-header p{
      margin:0;
      color:var(--site-muted);
    }

    .orders-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .orders-btn{
      border:none;
      border-radius:12px;
      padding:12px 18px;
      font-weight:700;
      text-decoration:none;
      cursor:pointer;
      transition:.2s ease;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .orders-btn:hover{
      transform:translateY(-1px);
    }

    .orders-btn-primary{
      background:var(--site-primary);
      color:#fff;
    }

    .orders-btn-primary:hover{
      background:var(--site-primary-dark);
    }

    .orders-btn-soft{
      background:#fff;
      color:var(--site-primary);
      border:1px solid var(--site-border);
    }

    .orders-btn-soft:hover{
      background:var(--site-soft);
    }

    .orders-list{
      display:grid;
      gap:18px;
    }

    .order-card{
      background:#fff;
      border:1px solid #ececec;
      border-radius:18px;
      box-shadow:0 6px 18px rgba(0,0,0,.04);
      overflow:hidden;
    }

    .order-card-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      padding:18px 22px;
      background:var(--site-soft-2);
      border-bottom:1px solid #ececec;
    }

    .order-card-head h3{
      margin:0 0 6px;
      color:#2f3b3b;
      font-size:1.1rem;
    }

    .order-card-head p{
      margin:0;
      color:var(--site-muted);
      font-size:.94rem;
    }

    .order-badge{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:7px 12px;
      font-size:.78rem;
      font-weight:700;
      white-space:nowrap;
    }

    .order-badge.pending{
      background:var(--site-warn-bg);
      color:var(--site-warn);
    }

    .order-badge.paid{
      background:var(--site-success-bg);
      color:var(--site-success);
    }

    .order-badge.shipped{
      background:var(--site-soft);
      color:var(--site-primary-dark);
    }

    .order-badge.cancelled{
      background:var(--site-danger-bg);
      color:var(--site-danger);
    }

    .order-card-body{
      padding:20px 22px 22px;
      display:grid;
      gap:14px;
    }

    .order-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:14px;
    }

    .order-box{
      background:var(--site-soft-2);
      border:1px solid #ececec;
      border-radius:14px;
      padding:14px 16px;
    }

    .order-box-label{
      display:block;
      font-size:.82rem;
      font-weight:700;
      color:var(--site-primary-dark);
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:.02em;
    }

    .order-box-value{
      color:var(--site-text);
      line-height:1.45;
    }

    .order-empty{
      background:#fff;
      border:1px dashed var(--site-border);
      border-radius:18px;
      padding:28px;
      text-align:center;
      color:var(--site-muted);
    }

    @media (max-width: 720px){
      .orders-header{
        flex-direction:column;
        align-items:flex-start;
      }

      .order-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <main class="orders-wrap">
    <section class="orders-header">
      <div>
        <h1>Mis pedidos</h1>
        <p>Consulta el estado y los datos básicos de tus pedidos realizados.</p>
      </div>

      <div class="orders-actions">
        <a href="./tienda.html" class="orders-btn orders-btn-primary">Volver a tienda</a>
        <button id="logout-user" class="orders-btn orders-btn-soft" type="button">Cerrar sesión</button>
      </div>
    </section>

    <section id="user-orders-list" class="orders-list"></section>
  </main>

  <script type="module" src="../js/mis-pedidos.js"></script>
</body>
</html>
